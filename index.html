<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POSCO 통합 운영 플랫폼</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      overflow-x: hidden;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #d0d0d0;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #b0b0b0;
    }

    /* Hero Section */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffffff 0%, #f5f7fa 100%);
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      animation: float 20s ease-in-out infinite;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -5%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, transparent 70%);
      border-radius: 50%;
      animation: float 25s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(30px); }
    }

    .hero-content {
      position: relative;
      z-index: 10;
      max-width: 900px;
      text-align: center;
      animation: fadeInUp 1s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
      animation: fadeInUp 1s ease-out 0.1s backwards;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: white;
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #1a1a1a;
    }

    h1 {
      font-size: clamp(40px, 5vw, 72px);
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1.2;
      margin-bottom: 20px;
      color: #1a1a1a;
      animation: fadeInUp 1s ease-out 0.2s backwards;
    }

    .highlight {
      background: linear-gradient(120deg, #3b82f6, #1e40af);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% 200%;
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .description {
      font-size: 18px;
      color: #5a5a5a;
      line-height: 1.8;
      margin-bottom: 40px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      animation: fadeInUp 1s ease-out 0.3s backwards;
    }

    .cta-section {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeInUp 1s ease-out 0.4s backwards;
    }

    .btn {
      padding: 14px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #1e40af);
      color: white;
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(59, 130, 246, 0.4);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #1a1a1a;
      border: 1px solid #e0e0e0;
    }

    .btn-secondary:hover {
      background: #e8e8e8;
      border-color: #d0d0d0;
      transform: translateY(-2px);
    }

    /* Features Grid */
    .features {
      position: relative;
      z-index: 20;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 60px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    .feature-card {
      padding: 24px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      text-align: center;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .feature-card:hover {
      border-color: #3b82f6;
      box-shadow: 0 12px 32px rgba(59, 130, 246, 0.15);
      transform: translateY(-4px);
    }

    .feature-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .feature-title {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .feature-desc {
      font-size: 12px;
      color: #5a5a5a;
      line-height: 1.6;
    }

    /* Stats Section */
    .stats {
      position: relative;
      z-index: 20;
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid rgba(200, 200, 200, 0.3);
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      font-size: 36px;
      font-weight: 800;
      color: #3b82f6;
      margin-bottom: 8px;
      font-variant-numeric: tabular-nums;
    }

    .stat-label {
      font-size: 14px;
      color: #5a5a5a;
    }

    /* Scroll indicator */
    .scroll-indicator {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      animation: bounce 2s infinite;
      z-index: 5;
      opacity: 0.6;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(10px); }
    }

    .scroll-indicator svg {
      width: 24px;
      height: 24px;
      stroke: #3b82f6;
      fill: none;
      stroke-width: 2;
    }

    /* Content section */
    .content {
      position: relative;
      z-index: 100;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      padding: 60px 20px;
    }

    .content-inner {
      max-width: 1000px;
      text-align: center;
    }

    .content h2 {
      font-size: 42px;
      font-weight: 800;
      margin-bottom: 20px;
      color: #1a1a1a;
    }

    .content p {
      font-size: 16px;
      color: #5a5a5a;
      line-height: 1.8;
      margin-bottom: 40px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      h1 {
        font-size: 44px;
      }

      .description {
        font-size: 16px;
      }

      .features {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 12px;
      }

      .stats {
        gap: 20px;
      }

      .stat-number {
        font-size: 28px;
      }

      .stat-label {
        font-size: 12px;
      }

      .cta-section {
        flex-direction: column;
        align-items: center;
      }

      .btn {
        width: 100%;
        max-width: 300px;
      }
    }
  </style>
</head>
<body>
  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <div class="logo-section">
        <div class="logo-icon">⚙️</div>
        <div class="logo-text">POSCO PLM</div>
      </div>

      <h1>POSCO <span class="highlight">통합 운영 플랫폼</span></h1>

      <p class="description">
        철강, 에너지, 이차전지 설비의 전체 생애주기를 한 곳에서 관리하고 최적화합니다.
      </p>

      <div class="cta-section">
        <button class="btn btn-primary">시작하기</button>
        <button class="btn btn-secondary">자세히 알아보기</button>
      </div>

      <div class="features">
        <div class="feature-card">
          <div class="feature-icon">📊</div>
          <div class="feature-title">실시간 모니터링</div>
          <div class="feature-desc">전체 설비의 상태를 실시간으로 추적</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon">🔄</div>
          <div class="feature-title">통합 관리</div>
          <div class="feature-desc">ERP, MES, EAM 완전 통합</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon">⚡</div>
          <div class="feature-title">고성능</div>
          <div class="feature-desc">초고속 처리 및 분석</div>
        </div>
      </div>

      <div class="stats">
        <div class="stat-item">
          <div class="stat-number">99.9%</div>
          <div class="stat-label">가용성</div>
        </div>
        <div class="stat-item">
          <div class="stat-number">24/7</div>
          <div class="stat-label">모니터링</div>
        </div>
        <div class="stat-item">
          <div class="stat-number">10K+</div>
          <div class="stat-label">설비 관리</div>
        </div>
      </div>
    </div>

    <div class="scroll-indicator">
      <svg viewBox="0 0 24 24">
        <path d="M12 5v14M19 12l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </section>

  <!-- Content Section -->
  <section class="content">
    <div class="content-inner">
      <h2>선진 설비 관리의 미래</h2>
      <p>
        POSCO 통합 운영 플랫폼은 국내 최고의 제조 기업의 노하우를 바탕으로
        설계되었습니다. 전세계 어디서나 설비를 효율적으로 관리하고 최적화할 수 있습니다.
      </p>
      <button class="btn btn-primary">더 알아보기</button>
    </div>
  </section>

  <script>
    // Smooth scroll behavior
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({ behavior: 'smooth' });
        }
      });
    });

    // Add scroll animation
    const observerOptions = {
      threshold: 0.1,
      rootMargin: '0px 0px -100px 0px'
    };

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.style.animation = 'fadeInUp 0.8s ease-out forwards';
          observer.unobserve(entry.target);
        }
      });
    }, observerOptions);

    document.querySelectorAll('.feature-card, .stat-item').forEach(el => {
      observer.observe(el);
    });

    // Buttons interaction
    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', function() {
        alert('이 기능은 준비 중입니다.');
      });
    });
  </script>
</body>
</html>
